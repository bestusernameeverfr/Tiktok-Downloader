<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Fighter II - Turbo Edition</title>
    <!-- Importing a brutal, heavy arcade game font -->
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Classic arcade stage backdrop vibe */
            background-color: #0b0813;
            background-image: 
                radial-gradient(circle at center, #221c3b 0%, #0b0813 100%);
            color: #ffffff;
            font-family: 'Teko', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .cabinet {
            background: linear-gradient(145deg, #181428, #0e0b17);
            border: 4px solid #ffcc00;
            border-radius: 8px;
            box-shadow: 0 0 0 6px #05040a, 0 20px 50px rgba(0, 0, 0, 0.9), inset 0 0 30px rgba(255, 102, 0, 0.15);
            padding: 35px 25px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
        }

        /* Street Fighter style header banner badge */
        .vs-banner {
            background: linear-gradient(90deg, #cc0000, #ff4500, #cc0000);
            border: 2px solid #ffcc00;
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 4px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(204, 0, 0, 0.5);
            text-shadow: 2px 2px 0px #000;
        }

        h1 {
            font-size: 52px;
            font-weight: 700;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(180deg, #fff700 0%, #ff6600 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 4px 4px 0px #990000;
            margin-bottom: 25px;
            font-style: italic;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 20px;
            color: #ffcc00;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px #000;
        }

        input {
            width: 100%;
            background: #06050a;
            border: 3px solid #ff6600;
            color: #00ffcc;
            padding: 12px 16px;
            font-family: 'Teko', sans-serif;
            font-size: 24px;
            letter-spacing: 1px;
            outline: none;
            border-radius: 4px;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.8);
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #ffcc00;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.8), 0 0 10px rgba(255, 204, 0, 0.5);
        }

        input::placeholder {
            color: #3b335c;
        }

        /* Chunky 3D Arcade Fighter Button */
        button {
            width: 100%;
            background: linear-gradient(180deg, #ff3300 0%, #990000 100%);
            border: 3px solid #ffcc00;
            border-bottom: 6px solid #4d0000;
            color: #ffffff;
            font-family: 'Teko', sans-serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 3px;
            padding: 10px;
            cursor: pointer;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #000;
            border-radius: 4px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
            transition: all 0.1s ease;
            margin-top: 10px;
        }

        button:hover {
            background: linear-gradient(180deg, #ff4d22 0%, #b30000 100%);
        }

        button:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.6);
        }

        #status {
            margin-top: 20px;
            font-size: 22px;
            color: #00ffcc;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0px #000;
            min-height: 25px;
        }

        .footer-tag {
            margin-top: 20px;
            font-size: 16px;
            color: #7a70a6;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="cabinet">
        <div class="vs-banner">ROUND 1 &bull; FIGHT!</div>
        
        <h1>TikTok Downloader</h1>

        <div class="input-group">
            <label>&gt; Enter Link Combo:</label>
            <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@...">
        </div>

        <button onclick="triggerDownload()">HADOUKEN! (GET MP4)</button>
        <p id="status"></p>

        <div class="footer-tag">&copy; 1991 CAPCOM STYLE UI</div>
    </div>

    <script>
        function triggerDownload() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const status = document.getElementById('status');

            if (!urlInput) {
                status.innerText = "PERFECT KO! (URL REQUIRED)";
                status.style.color = "#ff3300";
                return;
            }

            status.innerText = "BUFFERING SUPER COMBO...";
            status.style.color = "#ffcc00";

            window.location.href = `/api/download-get?url=${encodeURIComponent(urlInput)}`;
        }
    </script>
</body>
</html>
