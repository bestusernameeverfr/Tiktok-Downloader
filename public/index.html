<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #09090b;
            color: #fafafa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .wrapper {
            width: 100%;
            max-width: 440px;
        }
        .card {
            background: #121217;
            border: 1px solid #27272a;
            padding: 36px 32px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.025em;
        }
        .status-pill {
            font-size: 11px;
            font-weight: 500;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 4px 10px;
            border-radius: 100px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        p.description {
            color: #a1a1aa;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .input-wrapper {
            margin-bottom: 16px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #27272a;
            background: #18181b;
            color: #fafafa;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
        }
        input:focus {
            border-color: #52525b;
            box-shadow: 0 0 0 2px rgba(82, 82, 91, 0.3);
        }
        input::placeholder {
            color: #52525b;
        }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: #fafafa;
            color: #09090b;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }
        button:hover {
            background: #e4e4e7;
        }
        button:active {
            transform: scale(0.98);
        }
        #status {
            margin-top: 16px;
            font-size: 13px;
            color: #a1a1aa;
            text-align: center;
            min-height: 18px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="card">
            <div class="header">
                <h1>TikTok Downloader</h1>
                <div class="status-pill">Online</div>
            </div>
            <p class="description">Paste any TikTok video or post URL below to fetch the clean MP4 file instantly.</p>
            
            <div class="input-wrapper">
                <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@...">
            </div>
            
            <button onclick="triggerDownload()">Download Video</button>
            <p id="status"></p>
        </div>
    </div>

    <script>
        function triggerDownload() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const status = document.getElementById('status');

            if (!urlInput) {
                status.innerText = "Please provide a valid URL.";
                status.style.color = "#f87171";
                return;
            }

            status.innerText = "Processing request...";
            status.style.color = "#a1a1aa";

            window.location.href = `/api/download-get?url=${encodeURIComponent(urlInput)}`;
        }
    </script>
</body>
</html>
