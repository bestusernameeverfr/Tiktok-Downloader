<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Arcade - Downloader</title>
    <!-- Importing a classic retro pixel font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0b1e;
            /* Retro pixel grid background */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .arcade-cabinet {
            background: #1b1638;
            border: 4px solid #ffcc00;
            box-shadow: 0 0 0 4px #0d0b1e, 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0,0,0,0.5);
            padding: 30px 20px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
        }

        /* Top arcade marquee badge */
        .marquee {
            background: #ff0055;
            border: 2px solid #fff;
            color: #fff;
            font-size: 10px;
            padding: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            box-shadow: 0 4px 0 #990033;
        }

        h1 {
            font-size: 16px;
            color: #00ffcc;
            text-shadow: 3px 3px 0px #ff0055;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .score-text {
            font-size: 8px;
            color: #ffcc00;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 8px;
            color: #a7a2cb;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: #0d0b1e;
            border: 3px solid #5d5396;
            color: #00ffcc;
            padding: 14px;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            outline: none;
            box-shadow: inset 2px 2px 0px #000;
        }

        input:focus {
            border-color: #00ffcc;
        }

        input::placeholder {
            color: #3b3368;
            font-size: 8px;
        }

        /* Chunky 3D Arcade Button */
        button {
            width: 100%;
            background: #ffcc00;
            border: none;
            border-bottom: 6px solid #b38f00;
            color: #1b1638;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            padding: 16px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #0d0b1e;
            transition: all 0.1s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #ffdd33;
        }

        button:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            box-shadow: 0 1px 0 #0d0b1e;
        }

        #status {
            margin-top: 20px;
            font-size: 8px;
            color: #ff0055;
            min-height: 20px;
            line-height: 1.5;
        }

        .credits {
            margin-top: 25px;
            font-size: 7px;
            color: #5d5396;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="arcade-cabinet">
        <div class="marquee">★ INSERT LINK TO PLAY ★</div>
        
        <h1>TikTok<br>Downloader</h1>
        <div class="score-text">HIGH SCORE: 9999</div>

        <div class="input-group">
            <label>&gt; Paste URL:</label>
            <input type="text" id="urlInput" placeholder="https://tiktok.com/...">
        </div>

        <button onclick="triggerDownload()">GET MP4</button>
        <p id="status"></p>

        <div class="credits">1 PLAYER TOKEN = FREE</div>
    </div>

    <script>
        function triggerDownload() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const status = document.getElementById('status');

            if (!urlInput) {
                status.innerText = "ERROR: NO URL DETECTED!";
                return;
            }

            status.innerText = "LOADING STAGE... PLEASE WAIT.";
            status.style.color = "#00ffcc";

            window.location.href = `/api/download-get?url=${encodeURIComponent(urlInput)}`;
        }
    </script>
</body>
</html>
