<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h2 { margin-bottom: 20px; font-size: 22px; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2b2b2b;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #fe2c55;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #e0244a; }
        #status { margin-top: 15px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <div class="container">
        <h2>TikTok Downloader</h2>
        <input type="text" id="urlInput" placeholder="Paste TikTok Link Here...">
        <button id="downloadBtn" onclick="downloadVideo()">Get MP4</button>
        <p id="status"></p>
    </div>

    <script>
        async function downloadVideo() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const status = document.getElementById('status');
            const btn = document.getElementById('downloadBtn');

            if (!urlInput) {
                status.innerText = "Please paste a link first!";
                status.style.color = "#ff4d4d";
                return;
            }

            status.innerText = "Processing video, please wait...";
            status.style.color = "#aaa";
            btn.disabled = true;

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tiktokUrl: urlInput })
                });

                if (!response.ok) throw new Error('Failed to download video.');

                // Convert response stream into a downloadable file blob
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = 'tiktok_video.mp4';
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                window.URL.revokeObjectURL(downloadUrl);
                status.innerText = "Download started!";
                status.style.color = "#2ecc71";
            } catch (err) {
                console.error(err);
                status.innerText = "Error downloading video. Try again.";
                status.style.color = "#ff4d4d";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
