<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Line Downloader</title>
    <!-- Importing bold adventurous anime font -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Pirate ocean blue and parchment treasure map gradient */
            background-color: #0b1d3a;
            background-image: 
                radial-gradient(circle at center, #1b3a6b 0%, #0b1d3a 100%);
            color: #fff;
            font-family: 'Cinzel', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .treasure-chest {
            background: #fdf5e6; /* Parchment look */
            color: #2c1d0c;
            border: 6px solid #4a2e12;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(139, 94, 60, 0.2);
            padding: 40px 25px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
        }

        /* Jolly Roger style banner badge */
        .pirate-flag {
            background: #111;
            color: #fdf5e6;
            border: 3px dashed #ffd700;
            font-family: 'Bangers', cursive;
            font-size: 20px;
            letter-spacing: 2px;
            padding: 6px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: 40px;
            color: #8b0000; /* Pirate red */
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #ffd700;
            margin-bottom: 8px;
            line-height: 1;
        }

        .subtitle {
            font-size: 13px;
            font-weight: 700;
            color: #5c4033;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-family: 'Bangers', cursive;
            font-size: 18px;
            color: #4a2e12;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: #fff;
            border: 3px solid #8b5e3c;
            color: #2c1d0c;
            padding: 14px;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: #ff4500;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1), 0 0 10px rgba(255, 69, 0, 0.3);
        }

        input::placeholder {
            color: #b0a090;
            font-weight: 400;
        }

        /* Treasure Gold Button */
        button {
            width: 100%;
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 100%);
            border: 3px solid #4a2e12;
            border-bottom: 6px solid #8b4500;
            color: #2c1d0c;
            font-family: 'Bangers', cursive;
            font-size: 26px;
            letter-spacing: 2px;
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 8px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: all 0.1s ease;
            margin-top: 10px;
        }

        button:hover {
            background: linear-gradient(180deg, #ffea40 0%, #ffa500 100%);
        }

        button:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #status {
            margin-top: 20px;
            font-family: 'Bangers', cursive;
            font-size: 18px;
            color: #8b0000;
            letter-spacing: 1px;
            min-height: 25px;
        }

        .bounty-footer {
            margin-top: 25px;
            font-size: 11px;
            font-weight: 700;
            color: #7c5c3e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="treasure-chest">
        <div class="pirate-flag">🏴‍☠️ WANTED FOR DOWNLOADING 🏴‍☠️</div>
        
        <h1>Grand Line Downloader</h1>
        <div class="subtitle">Find Your Treasure MP4</div>

        <div class="input-group">
            <label>Paste Log Pose (URL):</label>
            <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@...">
        </div>

        <button onclick="triggerDownload()">Claim The One Piece!</button>
        <p id="status"></p>

        <div class="bounty-footer">Belly Reward: Free Forever</div>
    </div>

    <script>
        function triggerDownload() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const status = document.getElementById('status');

            if (!urlInput) {
                status.innerText = "Error: Missing Log Pose URL!";
                return;
            }

            status.innerText = "Setting sail to fetch video...";
            status.style.color = "#d2691e";

            window.location.href = `/api/download-get?url=${encodeURIComponent(urlInput)}`;
        }
    </script>
</body>
</html>
