<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: rgba(30, 30, 46, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .logo-badge {
            display: inline-block;
            background: linear-gradient(45deg, #fe2c55, #25f4ee);
            color: #000;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 5px 12px;
            border-radius: 20px;
            margin-bottom: 15px;
        }
        h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        p.subtitle {
            color: #a0aec0;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 15px 18px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 15, 25, 0.6);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: #25f4ee;
            box-shadow: 0 0 15px rgba(37, 244, 238, 0.2);
        }
        input::placeholder {
            color: #718096;
        }
        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #fe2c55 0%, #ff0055 100%);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(254, 44, 85, 0.4);
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(254, 44, 85, 0.6);
        }
        button:active {
            transform: translateY(0);
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
        }
        .footer-note {
            margin-top: 30px;
            font-size: 12px;
            color: #718096;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-badge">Watermark Free</div>
        <h2>TikTok Downloader</h2>
        <p class="subtitle">Paste your link below to download instantly</p>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@...">
        </div>
        
        <button onclick="triggerDownload()">Download MP4</button>
        <p id="status"></p>
        
        <div class="footer-note">Fast &bull; Secure &bull; No Watermark</div>
    </div>

    <script>
        function triggerDownload() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const status = document.getElementById('status');

            if (!urlInput) {
                status.innerText = "Please paste a link first!";
                status.style.color = "#ff4d4d";
                return;
            }

            status.innerText = "Preparing your download...";
            status.style.color = "#25f4ee";

            window.location.href = `/api/download-get?url=${encodeURIComponent(urlInput)}`;
        }
    </script>
</body>
</html>
