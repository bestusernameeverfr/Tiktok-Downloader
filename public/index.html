<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok // Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c;
            --bg-panel: #141419;
            --neon-cyan: #00f2ea; /* TikTok Cyan */
            --neon-pink: #ff0050; /* TikTok Pink */
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --border-color: #2a2a36;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            /* Cool futuristic grid pattern */
            background-image: 
                linear-gradient(0deg, rgba(30, 30, 40, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 30, 40, 0.2) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace; /* Monospace for hacker feel */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        /* Adding a subtle animated background light */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-cyan);
            filter: blur(150px);
            opacity: 0.05;
            border-radius: 50%;
            z-index: -1;
            animation: pulse 6s infinite alternate;
        }

        .main-container {
            width: 100%;
            max-width: 420px;
            position: relative;
        }

        /* "Glass" panel */
        .cyber-panel {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Scanline effect overlay */
        .cyber-panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), #ffffff, var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 1px;
        }

        .input-container {
            position: relative;
            margin-bottom: 25px;
        }

        /* Decorative corner */
        .input-container::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px;
            width: 10px; height: 10px;
            border-top: 2px solid var(--neon-cyan);
            border-left: 2px solid var(--neon-cyan);
        }

        input {
            width: 100%;
            background: var(--bg-deep);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 234, 0.2);
        }

        input::placeholder {
            color: #3a3a4a;
        }

        button {
            width: 100%;
            border: none;
            border-radius: 6px;
            padding: 18px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            /* Neon gradient button */
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
            background-size: 200% 100%;
            color: #000; /* Black text for contrast */
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            z-index: 1;
        }

        button:hover {
            background-position: 100% 0;
            box-shadow: 0 0 25px rgba(255, 0, 80, 0.6);
        }

        button:active {
            transform: translateY(1px);
        }

        #status {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--neon-cyan);
            min-height: 18px;
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        /* Animation keyframes */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.05; }
            100% { transform: scale(1.2); opacity: 0.1; }
        }

        /* Mobile responsiveness */
        @media (max-width: 480px) {
            .cyber-panel { padding: 30px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="cyber-panel">
            <div class="header">
                <h1>TikTok <span style="color: var(--neon-cyan)">//</span> DL</h1>
                <div class="subtitle">NEON DECODER UNIT</div>
            </div>
            
            <div class="input-container">
                <input type="text" id="urlInput" placeholder="PASTE TIKTOK URL HERE...">
            </div>
            
            <button onclick="triggerDownload()">Initialize Download</button>
            <p id="status"></p>
        </div>
    </div>

    <script>
        function triggerDownload() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const status = document.getElementById('status');
            const btn = document.querySelector('button');

            if (!urlInput) {
                status.innerText = "> ERROR: NO URL DETECTED";
                status.style.color = "var(--neon-pink)";
                status.style.textShadow = "0 0 5px var(--neon-pink)";
                return;
            }

            status.innerText = "> STATUS: ACQUIRING STREAM...";
            status.style.color = "var(--neon-cyan)";
            btn.innerText = "Processing...";
            btn.disabled = true;

            // Redirect to start download
            window.location.href = `/api/download-get?url=${encodeURIComponent(urlInput)}`;

            // Reset button after a few seconds just in case redirection takes time
            setTimeout(() => {
                btn.innerText = "Initialize Download";
                btn.disabled = false;
                status.innerText = "> READY";
            }, 5000);
        }
    </script>
</body>
</html>
